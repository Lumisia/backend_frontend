services:
  db:
    image: mariadb:11.4
    container_name: frontend_backend_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: web
      MARIADB_ROOT_PASSWORD: qwer1234
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-pqwer1234"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
